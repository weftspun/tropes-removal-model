[workspace]
name = "tropes-removal-model"
version = "0.1.0"
description = "ETNF trope datalake, a hybrid regex+SetFit trope classifier + FLAN-T5 rewriter exported to ONNX, and a pre-commit/CI gate"
channels = ["conda-forge"]
platforms = ["win-64", "osx-arm64", "linux-64"]

[dependencies]
python = "3.11.*"
pip = "*"
setuptools = "<81"   # autogluon.multimodal imports pkg_resources (removed in setuptools 81)
zstandard = "*"      # zst.py compresses/inflates the release datalake
pyarrow = "*"        # parquet read/write for the ETNF datalake

[pypi-dependencies]
autogluon = "*"
transformers = ">=4.41, <4.50"   # Seq2SeqTrainer for the rewriter; upper bound because setfit imports transformers.training_args.default_logdir, removed in transformers 5.x
datasets = "*"       # pulls public AI-vs-human corpora (e.g. HC3) for scripts/fetch_corpus.py
onnx = "*"
onnxruntime = "*"
onnxruntime-extensions = "*"  # gen_processing_models() builds the tokenizer branch of merged_model.onnx
optimum = { version = "*", extras = ["onnx", "onnxruntime"] }  # "exporters" extra was folded into these in optimum 2.x
pandas = "*"
pre-commit = "*"
anthropic = "*"      # LLM client for scripts/synth_generate.py (swappable)
pytest = "*"
setfit = ">=1.1.3, <2"
accelerate = ">=1.1.0"  # required by transformers' Trainer/Seq2SeqTrainer
skl2onnx = ">=1.20.0, <2"
onnxconverter-common = ">=1.16.0, <2"

# torch is platform-specific: win-64/linux-64 pull CUDA wheels from PyTorch's
# own index (plain PyPI wheels for those platforms are CPU-only and silently
# ignore a local GPU); osx-arm64 uses the default PyPI wheel, which already
# bundles MPS/Metal support.
[target.win-64.pypi-dependencies]
torch = { version = ">=2.6.0, <3", index = "https://download.pytorch.org/whl/cu124" }

[target.linux-64.pypi-dependencies]
torch = { version = ">=2.6.0, <3", index = "https://download.pytorch.org/whl/cu124" }

[target.osx-arm64.pypi-dependencies]
torch = ">=2.6.0, <3"

[tasks]
gpu-check = "python -c \"import torch;print('torch',torch.__version__);print('cuda',torch.cuda.is_available())\""
seed-tropes = "python scripts/seed_tropes.py"
build-datalake = "python scripts/build_datalake.py"
train-classifier = "python train_tropes.py"
train-rewriter = "python train_rewriter.py"
export-onnx = "python export_onnx_tropes.py"
gate = "python gate.py"
test = "pytest -q"
